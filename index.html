  <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flappy Probability Mobile</title>
    <style>
        :root {
            --sky: #4facfe;
            --primary: #FFD700;
            --secondary: #FF8C00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* ลบกรอบสีฟ้าเวลาแตะใน iOS */
        }

        body {
            margin: 0; padding: 0;
            background-color: #0f172a;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: sans-serif;
            overflow: hidden; 
            touch-action: none; /* บล็อกการเลื่อนหน้าจอระดับพื้นฐาน */
        }

        #game-wrapper {
            width: 100vw; height: 100vh;
            max-width: 450px; max-height: 850px;
            position: relative; overflow: hidden;
            background: #000;
        }

        canvas {
            display: block; width: 100%; height: 100%;
            background: var(--sky);
        }

        /* UI Overlays */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 100; text-align: center;
            background: rgba(0,0,0,0.4);
            color: white; transition: 0.3s;
        }

        .hud-top {
            position: absolute; top: 40px; width: 100%;
            display: flex; justify-content: space-around;
            pointer-events: none; z-index: 50;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.6); padding: 10px 20px;
            border-radius: 50px; font-weight: bold; font-size: 20px;
            border: 2px solid var(--primary);
        }

        .quiz-panel {
            background: white; color: #333; width: 85%;
            padding: 30px 20px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        button {
            background: var(--secondary); color: white; border: none;
            padding: 15px 40px; font-size: 20px; border-radius: 50px;
            font-weight: bold; margin-top: 20px; cursor: pointer;
            box-shadow: 0 5px 0 #a35d1a;
        }

        input {
            width: 80%; padding: 15px; margin: 20px 0;
            border: 2px solid #ddd; border-radius: 10px;
            font-size: 24px; text-align: center;
        }

        .hidden { display: none !important; }
        
        #tap-msg {
            position: absolute; bottom: 20%; width: 100%;
            text-align: center; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            animation: blink 1s infinite; pointer-events: none;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud" class="hud-top hidden">
        <div class="stat-box">Score: <span id="score">0</span></div>
        <div class="stat-box">❤️ <span id="hearts">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 40px; margin: 0;">PROBABILITY</h1>
        <h2 style="color: var(--primary); font-size: 50px; margin: 0;">CHICKEN</h2>
        <p>แตะเพื่อกระโดด | ตอบคำถามเพื่อเพิ่มหัวใจ</p>
        <button id="btn-start">START GAME</button>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="quiz-panel">
            <h2 style="color: var(--secondary);">CHALLENGE!</h2>
            <p id="q-text" style="font-size: 18px; font-weight: bold;"></p>
            <input type="text" id="q-input" inputmode="text" placeholder="คำตอบ">
            <button id="btn-submit">SUBMIT</button>
            <p style="color: #666; font-size: 14px; margin-top: 10px;">โอกาสที่เหลือ: <span id="q-tries">3</span></p>
        </div>
    </div>

    <div id="tap-msg" class="hidden">แตะหน้าจอเพื่อกระโดด!</div>
</div>

<script>
    // --- ระบบเสียงแบบ Web Audio (กันเงียบในมือถือ) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    function playSfx(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // --- ตัวแปรหลัก ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = window.innerWidth > 450 ? 450 : window.innerWidth;
        height = window.innerHeight > 850 ? 850 : window.innerHeight;
        canvas.width = width; canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    let state = "START";
    let score = 0, hearts = 0, frame = 0, pipes = [], qTries = 3;

    const bird = {
        x: 60, y: 0, w: 40, h: 30, v: 0, g: 0.25, jump: 5.5,
        draw() {
            ctx.save();
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, this.v * 0.1)));
            ctx.fillStyle = "#FFD700"; ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
            ctx.fillStyle = "black"; ctx.fillRect(10, -8, 5, 5); // ตา
            ctx.fillStyle = "#FF8C00"; ctx.fillRect(this.w/2 - 2, 0, 10, 8); // ปาก
            ctx.restore();
        },
        update() {
            if (state !== "PLAYING") return;
            this.v += this.g;
            this.y += this.v;
            if (this.y + this.h > height - 80) doGameOver();
        }
    };

    class Pipe {
        constructor() {
            this.x = width; this.w = 60; this.gap = 180;
            this.top = Math.random() * (height - 350) + 80;
            this.passed = false;
        }
        draw() {
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(this.x, 0, this.w, this.top);
            ctx.fillRect(this.x, this.top + this.gap, this.w, height);
        }
        update() {
            if (state !== "PLAYING") return;
            this.x -= 3;
            if (bird.x + bird.w - 5 > this.x && bird.x + 5 < this.x + this.w && (bird.y + 5 < this.top || bird.y + bird.h - 5 > this.top + this.gap)) doGameOver();
            if (!this.passed && bird.x > this.x + this.w) {
                score++; this.passed = true; playSfx(600, 'sine', 0.1);
                document.getElementById('score').innerText = score;
                if (score % 5 === 0) doQuiz();
            }
        }
    }

    const quizList = [
        { q: "ความน่าจะเป็นที่เหรียญออกหัว? (1/?)", a: "1/2" },
        { q: "ลูกเต๋าออกแต้ม 6 มีโอกาสกี่ส่วน? (1/?)", a: "1/6" },
        { q: "สุ่มหยิบเลข 1-10 โอกาสได้เลขคู่? (1/?)", a: "1/2" },
        { q: "ความน่าจะเป็นที่เหตุการณ์ไม่เกิดเลยคือเลขอะไร?", a: "0" }
    ];

    // --- การควบคุม (TOUCH CONTROL) ---
    function triggerJump(e) {
        if (e && e.cancelable) e.preventDefault();
        
        if (state === "WAITING" || state === "PLAYING") {
            state = "PLAYING";
            bird.v = -bird.jump;
            playSfx(400, 'sine', 0.1);
            document.getElementById('tap-msg').classList.add('hidden');
        }
    }

    // แก้ปัญหาจิ้มติดบ้างไม่ติดบ้าง
    window.addEventListener('touchstart', triggerJump, { passive: false });
    window.addEventListener('mousedown', (e) => {
        if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') triggerJump(e);
    });

    document.getElementById('btn-start').onclick = (e) => {
        e.stopPropagation();
        state = "WAITING"; score = 0; hearts = 0; pipes = []; bird.y = height/2; bird.v = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('tap-msg').classList.remove('hidden');
    };

    function doQuiz() {
        state = "QUIZ"; qTries = 3;
        const q = quizList[Math.floor(Math.random() * quizList.length)];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-tries').innerText = 3;
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('q-input').value = "";
        
        document.getElementById('btn-submit').onclick = () => {
            if (document.getElementById('q-input').value.trim() === q.a) {
                playSfx(800, 'sine', 0.2); hearts++;
                document.getElementById('hearts').innerText = hearts;
                state = "PLAYING"; document.getElementById('quiz-screen').classList.add('hidden');
            } else {
                playSfx(100, 'sawtooth', 0.2); qTries--;
                document.getElementById('q-tries').innerText = qTries;
                if (qTries <= 0) {
                    alert("คำตอบคือ: " + q.a);
                    state = "PLAYING"; document.getElementById('quiz-screen').classList.add('hidden');
                }
            }
        };
    }

    function doGameOver() {
        playSfx(150, 'square', 0.3);
        if (hearts > 0) {
            hearts--; document.getElementById('hearts').innerText = hearts;
            pipes = []; bird.y = height/3; bird.v = 0; return;
        }
        alert("GAME OVER! สถิติ: " + score);
        state = "START";
        document.getElementById('start-screen').classList.remove('hidden');
        document.getElementById('hud').classList.add('hidden');
    }

    function loop() {
        ctx.fillStyle = "#4facfe"; ctx.fillRect(0, 0, width, height);
        
        // ก้อนเมฆแบบง่าย
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(100, 100, 30, 0, 7); ctx.arc(130, 100, 40, 0, 7); ctx.fill();

        pipes.forEach((p, i) => { p.update(); p.draw(); if (p.x < -100) pipes.splice(i, 1); });
        
        // พื้น
        ctx.fillStyle = "#2ecc71"; ctx.fillRect(0, height - 80, width, 80);

        bird.update(); bird.draw();
        
        if (state === "PLAYING") {
            frame++;
            if (frame % 100 === 0) pipes.push(new Pipe());
        }
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
    
  </body>
  
</html>
